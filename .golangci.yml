# golangci-lint v2 configuration; migrated from v1 with `golangci-lint migrate`.
version: "2"
run:
  issues-exit-code: 127
  # lint test files too: most of this repository's assertions about its own
  # invariants live in tests, so they are worth holding to the same standard
  tests: true
linters:
  enable:
    - godot
    - misspell
    - prealloc
    - revive
    - unparam
  disable:
    # staticcheck was not enabled under v1 either; it is in v2's default set, so it
    # has to be turned off explicitly to keep the same linter set as before
    - staticcheck
  settings:
    govet:
      disable:
        - shadow
    misspell:
      locale: US
    revive:
      severity: warning
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    rules:
      # prealloc is a performance hint, and in test files it mostly fires on fixture
      # composite literals that are not built by appending at all
      - linters:
          - prealloc
        path: _test\.go
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/wcharczuk/go-incr)
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/wcharczuk/go-incr
  exclusions:
    generated: lax
    rules:
      # prealloc is a performance hint, and in test files it mostly fires on fixture
      # composite literals that are not built by appending at all
      - linters:
          - prealloc
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
